<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#F6EFDC" />
<title>Exercise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F6EFDC;
  --cream-2: #EFE7CD;
  --persimmon: #C9542A;
  --ink: #1B1A17;
  --ink-soft: #5C5849;
  --line: #1B1A17;
  --muted: #8A8576;
  --bg-input: #FBF6E6;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Atkinson Hyperlegible', ui-sans-serif, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
.mono {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum" 1;
}
button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: 0;
  padding: 0;
  cursor: pointer;
}
input {
  font-family: inherit;
  color: inherit;
}

/* ============== App shell ============== */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 88px;
  display: flex;
  flex-direction: column;
}
.app-head {
  padding: 14px 16px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-title {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.01em;
}
.app-main {
  flex: 1;
  padding: 6px 12px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ============== Panel ============== */
.panel {
  border: 1px solid var(--line);
  background: var(--cream);
}
.panel-head {
  background: var(--persimmon);
  color: var(--cream);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
}
.panel-title {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.panel-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--cream);
  font-size: 11px;
  text-transform: lowercase;
  opacity: 0.9;
}
.panel-back:active { opacity: 0.7; }
.panel-body {
  padding: 10px;
}

/* ============== Buttons ============== */
.btn {
  border: 1px solid var(--line);
  background: var(--cream);
  font-weight: 700;
  letter-spacing: 0.01em;
}
.btn-primary {
  background: var(--ink);
  color: var(--cream);
}
.btn-primary:active { background: var(--persimmon); }
.btn-md { padding: 9px 16px; font-size: 14px; }
.btn-disabled { opacity: 0.4; cursor: not-allowed; }

.form-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

/* ============== Date bar ============== */
.datebar {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  background: var(--cream);
}
.datebar-step {
  padding: 8px 14px;
  border-right: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
}
.datebar-step:last-child {
  border-right: 0;
  border-left: 1px solid var(--line);
}
.datebar-step:disabled { opacity: 0.25; }
.datebar-step:active:not(:disabled) {
  background: var(--cream-2);
}
.datebar-label {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
  align-items: center;
  justify-content: center;
}
.datebar-day {
  font-size: 13px;
  font-weight: 500;
}
.datebar-jump {
  font-size: 10px;
  color: var(--ink-soft);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ============== Totals bar ============== */
.totals-bar {
  display: flex;
  border: 1px solid var(--line);
  background: var(--cream);
}
.totals-cell {
  flex: 1;
  padding: 8px 6px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-right: 1px solid var(--line);
}
.totals-cell:last-child { border-right: 0; }
.totals-num {
  font-size: 22px;
  font-weight: 500;
  line-height: 1.1;
}
.totals-lbl {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  margin-top: 2px;
}

/* ============== Empty state ============== */
.empty-state {
  border: 1px dashed var(--line);
  padding: 28px 12px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
}

/* ============== Strength: list ============== */
.exercise-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: -1px;
  margin: -1px;
}
.exercise-btn {
  border: 1px solid var(--line);
  margin: -1px 0 0 -1px;
  padding: 12px 10px;
  text-align: left;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  min-height: 48px;
}
.exercise-btn:active {
  background: var(--cream-2);
}
.exercise-name {
  font-size: 13.5px;
  font-weight: 500;
  line-height: 1.2;
}
.exercise-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  font-size: 11px;
  background: var(--persimmon);
  color: var(--cream);
  font-weight: 500;
}

/* ============== Strength: set table ============== */
.set-table {
  border: 1px solid var(--line);
  margin-bottom: 8px;
}
.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 38px;
  align-items: stretch;
  border-bottom: 1px solid var(--line);
}
.set-row:last-child { border-bottom: 0; }
.set-row.set-head {
  background: var(--cream-2);
}
.set-head .set-col-idx,
.set-head .set-col-w,
.set-head .set-col-r {
  padding: 6px 8px;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
}
.set-col-idx {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  border-right: 1px solid var(--line);
}
.set-input {
  border: 0;
  border-right: 1px solid var(--line);
  background: var(--bg-input);
  padding: 10px 8px;
  font-size: 15px;
  width: 100%;
  text-align: center;
  -moz-appearance: textfield;
}
.set-input::-webkit-outer-spin-button,
.set-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.set-input:focus {
  outline: 0;
  background: var(--cream);
}
.set-del {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
}
.set-del:disabled { opacity: 0.25; }
.set-del:active:not(:disabled) { background: var(--cream-2); }

.add-set {
  width: 100%;
  border: 1px dashed var(--line);
  padding: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-soft);
  background: transparent;
}
.add-set:active { background: var(--cream-2); }

/* ============== Cardio: form ============== */
.cardio-types {
  display: flex;
  border: 1px solid var(--line);
  margin-bottom: 12px;
}
.cardio-type {
  flex: 1;
  padding: 9px 4px;
  font-size: 12.5px;
  font-weight: 500;
  border-right: 1px solid var(--line);
  background: var(--cream);
  letter-spacing: 0.01em;
}
.cardio-type:last-child { border-right: 0; }
.cardio-type.active {
  background: var(--ink);
  color: var(--cream);
}

.cardio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.cardio-input label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.auto-tag {
  font-size: 9.5px;
  padding: 1px 5px;
  background: var(--persimmon);
  color: var(--cream);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.cardio-field {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  background: var(--bg-input);
}
.cardio-field input {
  flex: 1;
  border: 0;
  background: transparent;
  padding: 10px 10px;
  font-size: 16px;
  width: 100%;
  -moz-appearance: textfield;
}
.cardio-field input::-webkit-outer-spin-button,
.cardio-field input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.cardio-field input:focus { outline: 0; }
.cardio-field .unit {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 12px;
  color: var(--ink-soft);
  padding: 0 10px;
  border-left: 1px solid var(--line);
  align-self: stretch;
  display: flex;
  align-items: center;
}

/* ============== Today: strength group ============== */
.strength-group {
  border-bottom: 1px solid var(--line);
  padding: 8px 0;
}
.strength-group:first-child { padding-top: 0; }
.strength-group:last-child { border-bottom: 0; padding-bottom: 0; }
.sg-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 4px;
}
.sg-name {
  font-weight: 700;
  font-size: 14px;
}
.sg-summary {
  font-size: 11px;
  color: var(--ink-soft);
}
.sg-sets {
  display: flex;
  flex-direction: column;
}
.sg-set {
  display: grid;
  grid-template-columns: 32px 64px 16px 1fr 28px;
  align-items: center;
  padding: 3px 0;
  font-size: 13px;
  gap: 4px;
}
.sg-idx { color: var(--ink-soft); }
.sg-x { color: var(--ink-soft); text-align: center; }
.sg-r { font-weight: 500; }
.sg-del {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-soft);
  padding: 4px;
}
.sg-del:active { color: var(--persimmon); }

/* ============== Today: cardio rows ============== */
.cardio-list {
  display: flex;
  flex-direction: column;
}
.cardio-row {
  display: grid;
  grid-template-columns: 64px 1fr 60px 60px 28px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--cream-2);
  font-size: 13px;
  gap: 4px;
}
.cardio-row:last-child { border-bottom: 0; }
.cardio-time {
  font-size: 11px;
  color: var(--ink-soft);
}
.cardio-type-lbl {
  font-weight: 500;
}
.cardio-dur, .cardio-kcal {
  font-size: 12px;
  text-align: right;
}
.cardio-del {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-soft);
  padding: 4px;
}
.cardio-del:active { color: var(--persimmon); }

/* ============== Segment control (Strength/Cardio toggle) ============== */
.segment {
  display: flex;
  border: 1px solid var(--line);
}
.segment-btn {
  flex: 1;
  padding: 10px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-weight: 500;
  font-size: 13px;
  border-right: 1px solid var(--line);
  background: var(--cream);
}
.segment-btn:last-child { border-right: 0; }
.segment-btn.active {
  background: var(--ink);
  color: var(--cream);
}

/* ============== Bottom nav ============== */
.bottom-nav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--cream);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 50;
}
.bottom-nav-inner {
  max-width: 480px;
  margin: 0 auto;
  display: flex;
}
.tab {
  flex: 1;
  padding: 10px 0 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  color: var(--ink-soft);
}
.tab-active { color: var(--persimmon); }
.tab-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

</style>
